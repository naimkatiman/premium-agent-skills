<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Premium Agent Skills, concept preview</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0b1020;
        color: #eef2ff;
        font: 16px/1.5 system-ui, sans-serif;
      }
      main { text-align: center; padding: 2rem; }
      h1 { font-weight: 650; letter-spacing: -0.02em; }
      .row { display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; margin-top: 1.5rem; }
      .card { background: #141a33; border-radius: 16px; padding: 1.25rem; }
      .card img { width: 128px; height: 128px; }
      p.note { opacity: 0.7; max-width: 46ch; margin: 1.5rem auto 0; }
    </style>
  </head>
  <body>
    <main>
      <h1>Premium Agent Skills</h1>
      <p>Original mascot concepts from <code>avatar-motion-forge</code>.</p>
      <div class="row">
        <div class="card"><img src="../../assets/icons/concept-one.svg" alt="Concept one" /></div>
        <div class="card"><img src="../../assets/icons/concept-two.svg" alt="Concept two" /></div>
        <div class="card"><img src="../../assets/icons/concept-three.svg" alt="Concept three" /></div>
      </div>
      <p class="note">
        Static preview stub. A full interactive demo (Lottie playback + state
        toggles) is deferred past v0.1.0, serve this folder with any static
        server to view the concepts.
      </p>
    </main>
  </body>
</html>
